name: Create Project Issues

# This workflow can be manually triggered to create all project issues
# It requires a GitHub token with 'issues: write' permission

on:
  workflow_dispatch:
    inputs:
      wave:
        description: 'Which wave to create (1, 2, 3, or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - '1'
          - '2'
          - '3'

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 create_issues.py

      - name: Summary
        run: |
          echo "## Issue Creation Complete" >> $GITHUB_STEP_SUMMARY
          echo "All issues for Wave ${{ github.event.inputs.wave }} have been created." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View them at: ${{ github.server_url }}/${{ github.repository }}/issues" >> $GITHUB_STEP_SUMMARY
